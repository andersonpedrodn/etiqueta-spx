<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SPX Express — Etiquetas de Armazenagem</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --spx: #E8471A;
    --spx-dark: #c43a14;
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #666;
    --border: #e0e0e0;
    --radius: 12px;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  header img {
    width: 160px;
    height: auto;
    margin-bottom: 0.5rem;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  header p {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 2rem;
    width: 100%;
    max-width: 440px;
    margin-bottom: 1.5rem;
  }

  .card h2 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 1.25rem;
  }

  .field { margin-bottom: 1.1rem; }

  .field label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .field input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    color: var(--text);
    background: #fafafa;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--spx); background: #fff; }

  .btn-gerar {
    width: 100%;
    padding: 12px;
    background: var(--spx);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.25rem;
  }

  .btn-gerar:hover { background: var(--spx-dark); }
  .btn-gerar:active { transform: scale(0.98); }

  #preview-area { width: 100%; max-width: 440px; display: none; }
  #preview-area.visible { display: block; }

  .etiqueta-preview {
    background: #fff;
    border: 2px solid #ccc;
    border-radius: var(--radius);
    padding: 1.75rem 2rem 1.5rem;
    text-align: center;
    margin-bottom: 1rem;
    font-family: Arial, Helvetica, sans-serif;
  }

  .et-logo {
    margin-bottom: 1.4rem;
  }

  .et-logo img {
    width: 140px;
    height: auto;
  }

  .et-nome-row {
    display: flex;
    align-items: flex-end;
    border-bottom: 2.5px solid #000;
    padding-bottom: 5px;
    margin-bottom: 1.4rem;
    text-align: left;
  }

  .et-nome-label {
    font-size: 22px;
    font-weight: 700;
    color: #000;
    white-space: nowrap;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .et-nome-valor {
    font-size: 20px;
    font-weight: 400;
    color: #000;
    flex: 1;
    min-width: 0;
    word-break: break-word;
  }

  .et-data-titulo {
    font-size: 20px;
    font-weight: 700;
    color: #000;
    margin-bottom: 0.75rem;
    letter-spacing: 0.5px;
  }

  .et-data-valor {
    font-size: 22px;
    font-weight: 700;
    color: #000;
    border-bottom: 2.5px solid #000;
    display: inline-block;
    padding: 0 1rem 4px;
    min-width: 200px;
  }

  .btn-imprimir {
    width: 100%;
    padding: 11px;
    background: transparent;
    color: var(--text);
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 0.6rem;
    transition: background 0.2s;
  }

  .btn-imprimir:hover { background: #f0f0f0; }

  .btn-nova {
    width: 100%;
    padding: 11px;
    background: transparent;
    color: var(--spx);
    border: 1px solid var(--spx);
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
    margin-bottom: 0.3rem;
  }

  .btn-nova:hover { background: #fff0eb; }

  .aviso {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 0.5rem;
  }

  @media print {
    body { background: white; padding: 0; margin: 0; }
    header, .card, .btn-imprimir, .btn-nova, .aviso { display: none !important; }
    #preview-area { display: block !important; max-width: 100%; }
    .etiqueta-preview {
      border: 1.5px solid #999;
      border-radius: 0;
      page-break-inside: avoid;
      padding: 2cm;
      width: 100%;
    }
  }
</style>
</head>

  <p class="aviso">Data preenchida automaticamente com o dia de hoje.</p>

<script>
  function gerarEtiqueta() {
    const nome = document.getElementById('nome').value.trim();
    if (!nome) {
      const inp = document.getElementById('nome');
      inp.focus();
      inp.style.borderColor = '#E8471A';
      setTimeout(() => inp.style.borderColor = '', 1500);
      return;
    }
    const hoje = new Date();
    const dd = String(hoje.getDate()).padStart(2, '0');
    const mm = String(hoje.getMonth() + 1).padStart(2, '0');
    const yyyy = hoje.getFullYear();
    document.getElementById('et-nome').textContent = nome;
    document.getElementById('et-data').textContent = dd + ' / ' + mm + ' / ' + yyyy;
    document.getElementById('form-card').style.display = 'none';
    document.getElementById('preview-area').classList.add('visible');
  }

  function novaEtiqueta() {
    document.getElementById('nome').value = '';
    document.getElementById('preview-area').classList.remove('visible');
    document.getElementById('form-card').style.display = 'block';
    document.getElementById('nome').focus();
  }

  document.getElementById('nome').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') gerarEtiqueta();
  });
</script>
